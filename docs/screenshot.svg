<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="2200" viewBox="0 0 2200 2200" font-family="-apple-system, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <!-- wallpaper -->
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#1d2b64"/>
      <stop offset="0.45" stop-color="#6a3093"/>
      <stop offset="1"   stop-color="#c2185b"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.18" cy="0.2" r="0.5">
      <stop offset="0" stop-color="#37c6ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#37c6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.85" r="0.6">
      <stop offset="0" stop-color="#ffb347" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#ffb347" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="0.7" cy="0.15" r="0.4">
      <stop offset="0" stop-color="#ff5fd2" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ff5fd2" stop-opacity="0"/>
    </radialGradient>

    <!-- menu panel material -->
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3a40" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#2b2b30" stop-opacity="0.94"/>
    </linearGradient>
    <linearGradient id="hl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a82f7"/>
      <stop offset="1" stop-color="#1f63e6"/>
    </linearGradient>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="34" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="barblur"><feGaussianBlur stdDeviation="0"/></filter>

    <style>
      .lbl   { font-size: 33px; fill: #f2f2f5; }
      .lbldim{ font-size: 33px; fill: #c7c7cf; }
      .barttl{ font-size: 30px; fill: #ffffff; font-weight: 500; }
      .barmenu{ font-size: 30px; fill: #ffffff; }
      .barmenuB{ font-size: 30px; fill: #ffffff; font-weight: 600; }
      .chev  { font-size: 30px; fill: #c7c7cf; }
    </style>
  </defs>

  <!-- ===== wallpaper (full square) ===== -->
  <rect width="2200" height="2200" fill="url(#wall)"/>
  <rect width="2200" height="2200" fill="url(#glow1)"/>
  <rect width="2200" height="2200" fill="url(#glow2)"/>
  <rect width="2200" height="2200" fill="url(#glow3)"/>

  <!-- UI centered in the square so a center-crop to 1380 tall lands on it -->
  <g transform="translate(0,410)">
  <!-- ===== menu bar ===== -->
  <rect x="0" y="0" width="2200" height="58" fill="#1a1a1f" fill-opacity="0.55"/>
  <!-- left: apple + app menus -->
  <g transform="translate(38,40)">
    <path d="M22 -14c1 0 3 1 3 4 0 3-3 4-3 4s-2-1-2-4 1-4 2-4z" fill="#ffffff"/>
    <path d="M14 -6c4-4 12-4 16 0 3 4 2 12-2 15-2 2-3 1-6 1s-4 1-6-1c-4-3-5-11-2-15z" fill="#ffffff"/>
  </g>
  <text x="92"  y="38" class="barmenuB">Wattmeter</text>
  <text x="262" y="38" class="barmenu">File</text>
  <text x="356" y="38" class="barmenu">Edit</text>
  <text x="456" y="38" class="barmenu">View</text>

  <!-- right cluster -->
  <g opacity="0.92">
    <!-- control center -->
    <g transform="translate(1300,18)" fill="none" stroke="#ffffff" stroke-width="2.4">
      <rect x="0" y="3" width="34" height="16" rx="8"/><circle cx="10" cy="11" r="5" fill="#fff"/>
      <rect x="0" y="-1" width="0" height="0"/>
    </g>
    <!-- wifi -->
    <g transform="translate(1380,16)" fill="#ffffff">
      <path d="M20 4C12 4 5 8 0 14l4 4c4-5 10-8 16-8s12 3 16 8l4-4c-5-6-12-10-20-10z" opacity="0.95"/>
      <path d="M20 16c-5 0-9 2-12 6l5 5c2-2 4-3 7-3s5 1 7 3l5-5c-3-4-7-6-12-6z"/>
      <circle cx="20" cy="30" r="4"/>
    </g>
    <!-- search -->
    <g transform="translate(1470,16)" fill="none" stroke="#ffffff" stroke-width="3">
      <circle cx="13" cy="13" r="11"/><line x1="21" y1="21" x2="30" y2="30"/>
    </g>
  </g>

  <!-- our app slot (highlighted) -->
  <rect x="1546" y="2" width="386" height="54" rx="8" fill="#ffffff" fill-opacity="0.16"/>
  <!-- battery template icon, ~72% filled, vertical -->
  <g transform="translate(1566,9) scale(2.0)" fill="#ffffff">
    <rect x="7" y="0.4" width="4" height="2" rx="0.9" opacity="0.85"/>
    <rect x="5" y="2.4" width="8" height="15" rx="2" fill="none" stroke="#ffffff" stroke-width="1.3" opacity="0.85"/>
    <rect x="6.3" y="6.4" width="5.4" height="9.0" rx="1"/>
  </g>
  <text x="1612" y="38" class="barttl">72%&#160;1&#189;h&#160;38W</text>

  <!-- clock far right -->
  <text x="2162" y="38" text-anchor="end" class="barmenu">Sat&#160;27&#160;Jun&#160;&#160;9:41</text>

  <!-- ===== dropdown menu ===== -->
  <g filter="url(#shadow)">
    <rect x="1546" y="74" width="624" height="740" rx="20" fill="url(#panel)"/>
    <rect x="1546" y="74" width="624" height="740" rx="20" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1.5"/>
  </g>

  <!-- rows -->
  <g>
    <!-- readouts -->
    <text x="1586" y="138" class="lbl">&#9889;&#160; Adapter: 60.0W</text>
    <text x="1586" y="196" class="lbl">&#8721;&#160; System: 22.5W</text>
    <text x="1586" y="254" class="lbl">&#129504;&#160; CPU: 8.3W</text>
    <text x="1586" y="312" class="lbl">&#127918;&#160; GPU: 2.1W</text>
    <text x="1586" y="370" class="lbl">&#128421;&#160; Other: 12.1W</text>
    <text x="1586" y="428" class="lbl">&#128267;&#160; To battery: 37.5W</text>
    <text x="1586" y="486" class="lbl">&#9201;&#160; Full in 1h30m</text>

    <line x1="1570" y1="518" x2="2146" y2="518" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5"/>

    <!-- status -->
    <text x="1586" y="566" class="lbldim">&#128267; 72%&#160;&#160; &#183; &#160;&#160;refresh ~1.2s</text>

    <line x1="1570" y1="598" x2="2146" y2="598" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5"/>

    <!-- top usage (selected) -->
    <rect x="1556" y="616" width="604" height="56" rx="10" fill="url(#hl)"/>
    <text x="1586" y="654" class="lbl" fill="#ffffff">Top usage&#160;&#160;10.4W</text>
    <text x="2128" y="654" text-anchor="end" class="chev" fill="#ffffff">&#9656;</text>

    <line x1="1570" y1="690" x2="2146" y2="690" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5"/>

    <!-- actions -->
    <text x="1586" y="742" class="lbl">Refresh now</text>
    <text x="1586" y="800" class="lbl">Quit</text>
  </g>

  <!-- ===== Top usage submenu (flipped left) ===== -->
  <g filter="url(#shadow)">
    <rect x="1006" y="600" width="520" height="318" rx="18" fill="url(#panel)"/>
    <rect x="1006" y="600" width="520" height="318" rx="18" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1.5"/>
  </g>
  <g>
    <text x="1042" y="662" class="lbl">Google Chrome</text>     <text x="1492" y="662" text-anchor="end" class="lbldim">~4.2W</text>
    <text x="1042" y="720" class="lbl">Code Helper (Renderer)</text><text x="1492" y="720" text-anchor="end" class="lbldim">~2.1W</text>
    <text x="1042" y="778" class="lbl">WindowServer</text>      <text x="1492" y="778" text-anchor="end" class="lbldim">~1.8W</text>
    <text x="1042" y="836" class="lbl">Slack</text>             <text x="1492" y="836" text-anchor="end" class="lbldim">~1.4W</text>
    <text x="1042" y="894" class="lbl">Spotify</text>           <text x="1492" y="894" text-anchor="end" class="lbldim">~0.9W</text>
  </g>
  </g>
</svg>
